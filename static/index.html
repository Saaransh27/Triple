<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple Extractor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--surface:#131316;--surface2:#1a1a1f;
  --border:#242428;--border2:#2e2e35;--text:#e2e2e8;--muted:#5a5a6e;
  --accent:#4ade80;--accent-dim:rgba(74,222,128,0.08);--accent-border:rgba(74,222,128,0.25);
  --warn:#fbbf24;--warn-dim:rgba(251,191,36,0.08);--warn-border:rgba(251,191,36,0.25);
  --blue:#7dd3fc;--blue-dim:rgba(125,211,252,0.08);--blue-border:rgba(125,211,252,0.25);
  --font-mono:'JetBrains Mono',monospace;--font-serif:'Fraunces',serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;font-size:13px;line-height:1.6}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:32px 32px;opacity:0.35;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:48px 24px 80px}

.hdr{margin-bottom:40px}
.hdr h1{font-family:var(--font-serif);font-size:28px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:6px}
.hdr p{font-size:11px;color:var(--muted);letter-spacing:0.08em}

.mode-toggle{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px;margin-bottom:24px;width:fit-content}
.mode-btn{background:none;border:none;color:var(--muted);font-family:var(--font-mono);font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer;transition:all 0.15s;letter-spacing:0.05em}
.mode-btn.active{background:var(--surface2);color:var(--accent)}

.input-wrap{margin-bottom:16px}
.input-label{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;display:block}
textarea,input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:13px;padding:14px 16px;border-radius:8px;outline:none;transition:border-color 0.2s;line-height:1.7}
textarea{resize:vertical;min-height:80px}
textarea:focus,input[type=text]:focus{border-color:var(--accent-border)}
textarea::placeholder,input[type=text]::placeholder{color:var(--muted)}
#bulk-input{min-height:160px}

.upload-zone{border:1.5px dashed var(--border2);border-radius:10px;padding:40px 24px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface);margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent-border);background:var(--accent-dim)}
.upload-zone svg{display:block;margin:0 auto 12px;color:var(--muted)}
.upload-zone:hover svg,.upload-zone.drag-over svg{color:var(--accent)}
.upload-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px}
.upload-sub{font-size:11px;color:var(--muted)}
#excel-input{display:none}

.file-badge{display:none;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 14px;margin-bottom:16px;font-size:12px}
.file-badge.show{display:flex}
.file-badge-name{flex:1;color:var(--text)}
.file-badge-size{color:var(--muted);font-size:11px}
.btn-remove{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--font-mono);font-size:10px;padding:3px 10px;border-radius:4px;cursor:pointer}
.btn-remove:hover{border-color:#f87171;color:#f87171}

.btn-row{display:flex;gap:10px;align-items:center;margin-bottom:28px;flex-wrap:wrap}
.extract-btn{background:var(--accent);color:#0a1a0e;font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:0.08em;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;transition:all 0.2s}
.extract-btn:hover:not(:disabled){opacity:0.9;transform:translateY(-1px)}
.extract-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}

.save-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:24px}
.save-panel-title{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px}
.save-row{display:flex;gap:10px;align-items:flex-end}
.save-row .input-wrap{flex:1;margin-bottom:0}
.save-btn{background:var(--warn-dim);border:1px solid var(--warn-border);color:var(--warn);font-family:var(--font-mono);font-size:12px;font-weight:500;padding:14px 22px;border-radius:6px;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.save-btn:hover:not(:disabled){background:var(--warn);color:#1a1000}
.save-btn:disabled{opacity:0.35;cursor:not-allowed}
.save-btn.saved{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.download-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--font-mono);font-size:11px;padding:8px 14px;border-radius:5px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.download-btn:hover{border-color:var(--accent-border);color:var(--accent)}
.save-notice{font-size:11px;margin-top:8px;padding:8px 12px;border-radius:5px;display:none}
.save-notice.ok{display:block;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent)}
.save-notice.fail{display:block;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171}

.error{display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:6px;padding:12px 14px;font-size:12px;color:#f87171;margin-bottom:16px}
.error.show{display:block}

.tc-group{margin-bottom:20px}
.tc-header{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:10px;padding:8px 12px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:6px}

.results{display:none}
.results.show{display:block}

.result-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.result-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);gap:12px}
.result-req{font-size:12px;color:var(--muted);flex:1;line-height:1.5}
.copy-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--font-mono);font-size:10px;padding:3px 10px;border-radius:4px;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.copy-btn:hover,.copy-btn.ok{border-color:var(--accent-border);color:var(--accent)}
.triples-list{padding:12px 14px;display:flex;flex-direction:column;gap:5px}
.triple{font-size:13px;color:var(--text);line-height:1.5}
.t-open,.t-close{color:var(--muted)}
.t-subject{color:#7dd3fc}
.t-sep{color:var(--border2);margin:0 2px}
.t-predicate{color:var(--accent)}
.t-object{color:#fbbf24}

.stats{display:flex;gap:20px;margin-bottom:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-n{font-size:20px;font-weight:500;color:var(--accent);line-height:1}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}

.copy-all-btn{background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);font-family:var(--font-mono);font-size:11px;padding:6px 14px;border-radius:5px;cursor:pointer;margin-bottom:16px}
.copy-all-btn:hover{background:var(--accent);color:#0a1a0e}

/* History tab */
.history-wrap{display:none}
.history-wrap.show{display:block}
.history-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.history-title{font-size:14px;font-weight:500;color:var(--text)}
.refresh-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all 0.15s}
.refresh-btn:hover{border-color:var(--blue-border);color:var(--blue)}

.run-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.run-card:hover{border-color:var(--border2)}
.run-card.expanded{border-color:var(--blue-border)}
.run-top{display:flex;align-items:center;gap:12px}
.run-number{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-dim);border:1px solid var(--blue-border);padding:3px 9px;border-radius:4px;flex-shrink:0}
.run-tc{font-size:13px;color:var(--text);flex:1}
.run-meta{font-size:11px;color:var(--muted);text-align:right;flex-shrink:0}
.run-chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--border)}
.chip-mode{background:var(--surface2);color:var(--muted)}
.chip-req{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}
.chip-triple{background:var(--warn-dim);color:var(--warn);border-color:var(--warn-border)}
.run-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.run-card.expanded .run-detail{display:block}
.no-history{font-size:12px;color:var(--muted);text-align:center;padding:32px;background:var(--surface);border:1px solid var(--border);border-radius:8px}

.loading{display:none;align-items:center;gap:10px;font-size:12px;color:var(--muted);margin-bottom:20px}
.loading.show{display:flex}
.spinner{width:14px;height:14px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <h1>Triple Extractor</h1>
    <p>requirement → (subject, predicate, object) — one fact, one triple</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('single',this)">Single</button>
    <button class="mode-btn" onclick="setMode('bulk',this)">Bulk</button>
    <button class="mode-btn" onclick="setMode('excel',this)">Excel</button>
    <button class="mode-btn" onclick="setMode('history',this)">History</button>
  </div>

  <!-- Single -->
  <div id="mode-single">
    <div class="input-wrap">
      <label class="input-label">Requirement</label>
      <textarea id="single-input" placeholder="e.g. Click the Dev button to select the Dev environment" rows="3"></textarea>
    </div>
    <div class="btn-row">
      <button class="extract-btn" id="single-btn" onclick="runSingle()">Extract triples</button>
    </div>
  </div>

  <!-- Bulk -->
  <div id="mode-bulk" style="display:none">
    <div class="input-wrap">
      <label class="input-label">Requirements — one per line</label>
      <textarea id="bulk-input" placeholder="Navigate to https://automate.nogrunt.com/new/test-studio&#10;Locate and click the Settings icon&#10;Click the Dev button to select the Dev environment"></textarea>
    </div>
    <div class="btn-row">
      <button class="extract-btn" id="bulk-btn" onclick="runBulk()">Extract all triples</button>
    </div>
  </div>

  <!-- Excel -->
  <div id="mode-excel" style="display:none">
    <div class="upload-zone" id="upload-zone">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9,15 12,12 15,15"/>
      </svg>
      <div class="upload-title">Drop your Excel file here</div>
      <div class="upload-sub">or click to browse · .xlsx only · reads Test Case Title + Execution Steps columns</div>
      <input type="file" id="excel-input" accept=".xlsx,.xls">
    </div>
    <div class="file-badge" id="file-badge">
      <span class="file-badge-name" id="file-name"></span>
      <span class="file-badge-size" id="file-size"></span>
      <button class="btn-remove" onclick="clearFile()">✕</button>
    </div>
    <div class="btn-row">
      <button class="extract-btn" id="excel-btn" onclick="runExcel()" disabled>Extract from Excel</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-wrap" id="mode-history">
    <div class="history-hdr">
      <span class="history-title">Run history</span>
      <button class="refresh-btn" onclick="loadHistory()">↻ Refresh</button>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- Save Panel -->
  <div class="save-panel" id="save-panel" style="display:none">
    <div class="save-panel-title">Save to file</div>
    <div class="save-row">
      <div class="input-wrap">
        <label class="input-label">Test Case Number / ID</label>
        <input type="text" id="test-case-number" placeholder="e.g. TC-001">
      </div>
      <button class="save-btn" id="save-btn" onclick="saveTestCase()">Save test case</button>
      <button class="download-btn" onclick="downloadFile()">↓ Download</button>
    </div>
    <div class="save-notice" id="save-notice"></div>
  </div>

  <div class="error" id="err"></div>
  <div class="loading" id="loading"><div class="spinner"></div><span id="loading-txt">Extracting…</span></div>
  <div class="results" id="results"></div>

</div>
<script>
let mode = 'single';
let lastResults = [];
let lastTestCases = null; // grouped structure for Excel mode
let excelFile = null;
let allTriplesText = '';
let currentSource = '';

// ── Mode ───────────────────────────────────────────────────────────────────────
function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['single','bulk','excel'].forEach(id => {
    const el = document.getElementById('mode-'+id);
    if (el) el.style.display = m === id ? 'block' : 'none';
  });
  const hw = document.getElementById('mode-history');
  hw.className = 'history-wrap' + (m === 'history' ? ' show' : '');
  if (m === 'history') { loadHistory(); return; }
  document.getElementById('results').className = 'results';
  document.getElementById('results').innerHTML = '';
  document.getElementById('save-panel').style.display = 'none';
  lastResults = []; lastTestCases = null; currentSource = '';
  showErr('');
}

// ── Excel upload ───────────────────────────────────────────────────────────────
const uploadZone = document.getElementById('upload-zone');
const excelInput = document.getElementById('excel-input');
uploadZone.addEventListener('click', () => excelInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if (f) setExcelFile(f);
});
excelInput.addEventListener('change', () => { if (excelInput.files[0]) setExcelFile(excelInput.files[0]); });

function setExcelFile(f) {
  excelFile = f; currentSource = f.name;
  document.getElementById('file-name').textContent = f.name;
  document.getElementById('file-size').textContent = (f.size/1024).toFixed(1)+' KB';
  document.getElementById('file-badge').classList.add('show');
  document.getElementById('excel-btn').disabled = false;
}
function clearFile() {
  excelFile = null; excelInput.value = ''; currentSource = '';
  document.getElementById('file-badge').classList.remove('show');
  document.getElementById('excel-btn').disabled = true;
  document.getElementById('results').className = 'results';
  document.getElementById('results').innerHTML = '';
  document.getElementById('save-panel').style.display = 'none';
  lastResults = [];
}

// ── Extract Excel ──────────────────────────────────────────────────────────────
async function runExcel() {
  if (!excelFile) return;
  showErr(''); setLoading(true,'Parsing Excel and extracting triples…');
  document.getElementById('excel-btn').disabled = true;
  document.getElementById('results').className = 'results';
  document.getElementById('results').innerHTML = '';
  document.getElementById('save-panel').style.display = 'none';
  lastResults = [];

  try {
    const fd = new FormData(); fd.append('file', excelFile);
    const resp = await fetch('/upload-excel', {method:'POST', body:fd});
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Extraction failed');

    const tcs = data.test_cases;
    let totalSteps=0, totalTriples=0;
    tcs.forEach(tc => { totalSteps+=tc.results.length; tc.results.forEach(r=>totalTriples+=r.triples.length); });
    lastTestCases = tcs;  // keep grouped for saving
    lastResults = tcs.flatMap(tc => tc.results.filter(r=>!r.error));
    tcs.forEach(tc => tc.results.forEach(r=>{ if(r.enrichment) mergeEnrichment(r.enrichment); }));
    allTriplesText = lastResults.map(r=>r.triples.join('\n')).join('\n');

    let html = `<div class="stats">
      <div class="stat"><div class="stat-n">${tcs.length}</div><div class="stat-l">Test Cases</div></div>
      <div class="stat"><div class="stat-n">${totalSteps}</div><div class="stat-l">Steps</div></div>
      <div class="stat"><div class="stat-n">${totalTriples}</div><div class="stat-l">Triples</div></div>
    </div><button class="copy-all-btn" onclick="copyText(allTriplesText,this)">Copy all triples</button>`;

    for (const tc of tcs) {
      html += `<div class="tc-group"><div class="tc-header">${esc(tc.test_case)}</div>
        ${tc.results.map(r=>renderBlock(r.requirement,r.triples,r.annotations,r.error)).join('')}
      </div>`;
    }
    document.getElementById('results').innerHTML = html;
    document.getElementById('results').className = 'results show';
    if (lastResults.length>0) showSavePanel();
  } catch(e) { showErr(e.message); }
  finally { setLoading(false); document.getElementById('excel-btn').disabled=false; }
}

// ── Single ─────────────────────────────────────────────────────────────────────
async function runSingle() {
  const req = document.getElementById('single-input').value.trim();
  if (!req) return;
  currentSource = 'single input';
  showErr(''); setLoading(true);
  document.getElementById('single-btn').disabled = true;
  document.getElementById('results').className='results';
  document.getElementById('results').innerHTML='';
  document.getElementById('save-panel').style.display='none';
  lastResults=[];

  try {
    const resp = await fetch('/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requirement:req})});
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail||'Extraction failed');
    lastResults=[{requirement:req,triples:data.triples||[],annotations:data.annotations||[]}];
    mergeEnrichment(data.enrichment||{});
    allTriplesText=(data.triples||[]).join('\n');
    document.getElementById('results').innerHTML=renderBlock(req,data.triples,data.annotations,null);
    document.getElementById('results').className='results show';
    showSavePanel();
  } catch(e){showErr(e.message);}
  finally{setLoading(false);document.getElementById('single-btn').disabled=false;}
}

// ── Bulk ───────────────────────────────────────────────────────────────────────
async function runBulk() {
  const raw=document.getElementById('bulk-input').value.trim();
  if (!raw) return;
  const requirements=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  if (!requirements.length) return;
  currentSource='bulk input';
  showErr(''); setLoading(true,`Extracting ${requirements.length} requirements…`);
  document.getElementById('bulk-btn').disabled=true;
  document.getElementById('results').className='results';
  document.getElementById('results').innerHTML='';
  document.getElementById('save-panel').style.display='none';
  lastResults=[];

  try {
    const resp=await fetch('/extract-bulk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requirements})});
    const data=await resp.json();
    if (!resp.ok) throw new Error(data.detail||'Extraction failed');
    const results=data.results;
    const totalTriples=results.reduce((s,r)=>s+r.triples.length,0);
    const failed=results.filter(r=>r.error).length;
    lastResults=results.filter(r=>!r.error);
    results.forEach(r=>{ if(r.enrichment) mergeEnrichment(r.enrichment); });
    allTriplesText=results.map(r=>(r.triples||[]).join('\n')).join('\n');

    let html=`<div class="stats">
      <div class="stat"><div class="stat-n">${requirements.length}</div><div class="stat-l">Requirements</div></div>
      <div class="stat"><div class="stat-n">${totalTriples}</div><div class="stat-l">Triples</div></div>
      ${failed?`<div class="stat"><div class="stat-n" style="color:#f87171">${failed}</div><div class="stat-l">Failed</div></div>`:''}
    </div><button class="copy-all-btn" onclick="copyText(allTriplesText,this)">Copy all triples</button>`;
    html+=results.map(r=>renderBlock(r.requirement,r.triples,r.annotations,r.error)).join('');
    document.getElementById('results').innerHTML=html;
    document.getElementById('results').className='results show';
    if (lastResults.length>0) showSavePanel();
  } catch(e){showErr(e.message);}
  finally{setLoading(false);document.getElementById('bulk-btn').disabled=false;}
}

// ── Render ─────────────────────────────────────────────────────────────────────
function parseTriple(line) {
  const inner=line.replace(/^\(|\)$/g,'');
  const parts=inner.split(',').map(s=>s.trim());
  if (parts.length<3) return null;
  return {subject:parts[0],predicate:parts[1],object:parts.slice(2).join(', ')};
}
function renderTriple(line) {
  const t=parseTriple(line);
  if (!t) return `<div class="triple"><span class="t-open">(</span>${esc(line)}<span class="t-close">)</span></div>`;
  return `<div class="triple"><span class="t-open">(</span><span class="t-subject">${esc(t.subject)}</span><span class="t-sep">,</span><span class="t-predicate"> ${esc(t.predicate)}</span><span class="t-sep">,</span><span class="t-object"> ${esc(t.object)}</span><span class="t-close">)</span></div>`;
}
function renderBlock(requirement,triples,annotations,error) {
  const tHtml=error
    ?`<div style="padding:12px 14px;font-size:12px;color:#f87171">${esc(error)}</div>`
    :`<div class="triples-list">
        ${(triples||[]).map(renderTriple).join('')}
        ${annotations&&annotations.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${annotations.map(a=>`<div style="font-size:11px;color:var(--muted);padding:2px 0">${esc(a)}</div>`).join('')}</div>`:''}
      </div>`;
  const ct=(triples||[]).join('\n')+(annotations&&annotations.length?'\n'+annotations.join('\n'):'');
  return `<div class="result-block"><div class="result-hdr"><span class="result-req">${esc(requirement)}</span>${!error?`<button class="copy-btn" onclick="copyText(${JSON.stringify(ct)},this)">Copy</button>`:''}</div>${tHtml}</div>`;
}

// ── Save ───────────────────────────────────────────────────────────────────────
function showSavePanel() {
  document.getElementById('save-panel').style.display='block';
  document.getElementById('save-notice').className='save-notice';
  document.getElementById('save-btn').className='save-btn';
  document.getElementById('save-btn').textContent='Save test case';
}
async function saveTestCase() {
  const tcNum=document.getElementById('test-case-number').value.trim();
  if (!tcNum){showSaveNotice('fail','Enter a test case number first.');return;}
  if (!lastResults.length){showSaveNotice('fail','No results to save.');return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Saving…';
  try {
    // Excel mode — send grouped structure so test case names are preserved
    // Single/bulk — send flat results
    const payload = lastTestCases
      ? {test_case_number:tcNum, test_cases:lastTestCases, mode:mode, source:currentSource}
      : {test_case_number:tcNum, results:lastResults, mode:mode, source:currentSource};

    const resp=await fetch('/store-test-case',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)});
    const data=await resp.json();
    if (!resp.ok) throw new Error(data.detail||'Save failed');
    btn.className='save-btn saved'; btn.textContent='Saved ✓';
    const tcCount = data.test_cases_count || 1;
    showSaveNotice('ok',`Run #${data.run_number} saved — ${tcCount} test case(s), ${data.triples_count} triple(s) → ${data.file}`);
  } catch(e){btn.className='save-btn';btn.textContent='Save test case';showSaveNotice('fail',e.message);}
  finally{btn.disabled=false;}
}
function showSaveNotice(type,msg){const el=document.getElementById('save-notice');el.className=`save-notice ${type}`;el.textContent=msg;}

// ── History ────────────────────────────────────────────────────────────────────
async function loadHistory() {
  const container=document.getElementById('history-list');
  container.innerHTML='<div style="font-size:12px;color:var(--muted);padding:12px 0">Loading…</div>';
  try {
    const resp=await fetch('/history');
    const data=await resp.json();
    if (!data.runs||!data.runs.length){
      container.innerHTML='<div class="no-history">No runs saved yet. Extract and save a test case to see history here.</div>';
      return;
    }
    container.innerHTML=data.runs.map(r=>renderRunCard(r)).join('');
  } catch(e){container.innerHTML=`<div class="no-history" style="color:#f87171">Failed to load history: ${e.message}</div>`;}
}

function renderRunCard(r) {
  const ts=new Date(r.timestamp).toLocaleString();
  const id=`run-${r.run_number}`;
  return `<div class="run-card" id="${id}" onclick="toggleRun(${r.run_number})">
    <div class="run-top">
      <span class="run-number">Run #${r.run_number}</span>
      <span class="run-tc">${esc(r.test_case_number)}</span>
      <span class="run-meta">${ts}</span>
    </div>
    <div class="run-chips">
      <span class="chip chip-mode">${r.mode||'—'}</span>
      <span class="chip chip-req">${r.requirements_count} req</span>
      <span class="chip chip-triple">${r.triples_count} triples</span>
      ${r.source?`<span class="chip chip-mode">${esc(r.source)}</span>`:''}
    </div>
    <div class="run-detail" id="detail-${r.run_number}">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Loading detail…</div>
    </div>
  </div>`;
}

async function toggleRun(runNumber) {
  const card=document.getElementById(`run-${runNumber}`);
  const detail=document.getElementById(`detail-${runNumber}`);
  const isExpanded=card.classList.contains('expanded');
  card.classList.toggle('expanded');
  if (!isExpanded && detail.innerHTML.includes('Loading detail')) {
    try {
      const resp=await fetch(`/history/${runNumber}`);
      const data=await resp.json();
      detail.innerHTML=data.results.map(r=>renderBlock(r.requirement,r.triples,r.annotations,r.error)).join('');
    } catch(e){detail.innerHTML=`<div style="color:#f87171;font-size:12px">${e.message}</div>`;}
  }
}

// ── Utilities ──────────────────────────────────────────────────────────────────
function mergeEnrichment(enrichment) {
  // Store enrichment data in sessionStorage keyed by element name
  let stored = {};
  try { stored = JSON.parse(sessionStorage.getItem('elem_enrichment')||'{}'); } catch {}
  for (const [key, val] of Object.entries(enrichment)) {
    if (!stored[key]) {
      stored[key] = val;
    } else {
      if (!stored[key].location && val.location) stored[key].location = val.location;
      if (!stored[key].desc     && val.desc)     stored[key].desc     = val.desc;
    }
  }
  try { sessionStorage.setItem('elem_enrichment', JSON.stringify(stored)); } catch {}
}

function downloadFile(){window.open('/download-test-cases','_blank');}
function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.textContent;btn.textContent='Copied';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('ok');},1500);
  });
}
function showErr(msg){const el=document.getElementById('err');el.textContent=msg;el.className='error'+(msg?' show':'');}
function setLoading(show,txt='Extracting…'){
  document.getElementById('loading').className='loading'+(show?' show':'');
  document.getElementById('loading-txt').textContent=txt;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.getElementById('single-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();runSingle();}});
</script>
